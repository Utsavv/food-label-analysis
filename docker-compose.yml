services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: labelwatch
      POSTGRES_PASSWORD: labelwatch
      POSTGRES_DB: labelwatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labelwatch"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://labelwatch:labelwatch@db:5432/labelwatch
      ARTIFACT_DIR: /srv/artifacts
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OCR_PROVIDER: ${OCR_PROVIDER:-mock}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-true}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    command: >
      sh -c "alembic upgrade head &&
             python -m seed.seed_demo &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - artifacts:/srv/artifacts
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  artifacts:
